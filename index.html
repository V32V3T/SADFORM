<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swad-E-Ratlam Namkeen Order Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-logo">
             <img src="logo.png" alt="Logo" id="form-logo-img">
        </div>
        <h2 class="brand-name">Swad – E – Ratlam</h2>
        <h1>Namkeen Order Placement Form</h1>
        <form id="order-form">

            <!-- Customer Details Section -->
            <fieldset>
                <legend>Customer Details</legend>
                <div class="form-group">
                    <label for="fullName">Full Name:</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone" pattern="[6-9][0-9]{9}" placeholder="e.g., 9876543210" required title="Please enter a valid 10-digit Indian mobile number">
                </div>
                <div class="form-group address">
                    <label>Delivery Address:</label>
                    <input type="text" id="houseNo" name="houseNo" placeholder="House / Flat No.">
                    <input type="text" id="area" name="area" placeholder="Area / Landmark">
                    <input type="text" id="city" name="city" placeholder="City">
                    <input type="number" id="pincode" name="pincode" placeholder="Pincode" pattern="[0-9]{6}" title="Please enter a valid 6-digit Pincode">
                </div>
            </fieldset>

            <!-- Namkeen Selection Section -->
            <fieldset>
                <legend>Select Namkeen</legend>
                <div id="namkeen-list">
                    <!-- Namkeen items will be loaded here by JavaScript -->
                </div>
                <div class="form-group total-amount">
                    <strong>Total Amount: ₹<span id="total-amount">0.00</span></strong>
                </div>
            </fieldset>

            <!-- Special Instructions Section -->
            <fieldset>
                <legend>Special Instructions</legend>
                <div class="form-group">
                    <textarea id="instructions" name="instructions" rows="4" placeholder="Any special requests or notes..."></textarea>
                </div>
            </fieldset>

            <!-- Payment Method Section -->
            <fieldset>
                <legend>Payment Method</legend>
                <div class="form-group">
                    <input type="radio" id="upi" name="paymentMethod" value="UPI" checked>
                    <label for="upi">UPI (Google Pay / PhonePe / Paytm)</label>
                </div>
                <div class="form-group">
                    <input type="radio" id="bankTransfer" name="paymentMethod" value="Bank Transfer">
                    <label for="bankTransfer">Bank Transfer</label>
                </div>
            </fieldset>

            <!-- Submit Button -->
            <div class="form-group">
                <button type="submit">Place Order</button>
            </div>
        </form>
    </div>

    <!-- Order Summary Modal -->
    <div id="summary-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>Order Summary</h2>
            <div id="summary-details"></div>
            <button id="confirm-order">Confirm Order</button>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
